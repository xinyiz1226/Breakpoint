<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Tennis clip selector</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    margin: 0; padding: 0;
    display: grid;
    grid-template-columns: minmax(360px, 1fr) minmax(360px, 480px);
    grid-template-rows: auto 1fr;
    height: 100vh;
  }
  header {
    grid-column: 1 / -1;
    padding: 10px 14px;
    border-bottom: 1px solid #8884;
    display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
  }
  header label { display: inline-flex; align-items: center; gap: 6px; }
  header button { padding: 6px 12px; }
  #status { margin-left: auto; opacity: .75; font-size: 12px; }
  .left { padding: 12px; display: flex; flex-direction: column; gap: 10px; min-height: 0; }
  video { width: 100%; max-height: 60vh; background: #000; border-radius: 6px; }
  .now {
    font-variant-numeric: tabular-nums;
    display: flex; gap: 14px; align-items: center; flex-wrap: wrap;
  }
  .now b { font-size: 16px; }
  .right {
    border-left: 1px solid #8884;
    overflow: auto;
    padding: 8px 0;
  }
  table { width: 100%; border-collapse: collapse; font-variant-numeric: tabular-nums; }
  th, td { padding: 6px 8px; border-bottom: 1px solid #8882; text-align: left; vertical-align: middle; }
  th { position: sticky; top: 0; background: Canvas; z-index: 1; }
  tbody tr.playing { background: #4a90e233; }
  tbody tr.kept { background: #2ecc7122; }
  td.id { font-weight: 600; white-space: nowrap; }
  td.time { white-space: nowrap; }
  td.meta { font-size: 12px; opacity: .75; }
  td button { padding: 2px 8px; }
  .hint { padding: 14px; opacity: .7; font-size: 13px; }
  .row-actions { display: flex; gap: 4px; }
  input[type="checkbox"] { width: 18px; height: 18px; }
  .legend { font-size: 12px; opacity: .8; }
  .keep-count { font-weight: 600; }
  .danger { color: #e74c3c; }
  .pill {
    display: inline-block; padding: 1px 6px; border-radius: 8px;
    font-size: 11px; background: #8884;
  }
  .auto-stop {
    display: inline-flex; align-items: center; gap: 6px;
  }
</style>
</head>
<body>
<header>
  <label>Video <input type="file" id="videoFile" accept="video/*" /></label>
  <label>Checklist .md <input type="file" id="mdFile" accept=".md,text/markdown" /></label>
  <button id="saveBtn" disabled>Download updated .md</button>
  <label class="auto-stop"><input type="checkbox" id="autoStop" checked /> Stop at clip end</label>
  <span id="status">Load a video and a candidates .md to begin.</span>
</header>

<section class="left">
  <video id="player" controls preload="metadata"></video>
  <div class="now">
    <span>Now: <b id="curTime">00:00:00.000</b></span>
    <span>Playing: <b id="playingId">—</b></span>
    <span class="legend">Click <span class="pill">▶</span> to preview a clip. Tick checkbox to keep.</span>
    <span style="margin-left:auto" class="legend">Kept: <span id="keepCount" class="keep-count">0</span> / <span id="totalCount">0</span></span>
  </div>
</section>

<aside class="right">
  <div id="empty" class="hint">No checklist loaded yet.</div>
  <table id="tbl" hidden>
    <thead>
      <tr>
        <th>Keep</th><th>ID</th><th>Start → End</th><th>Meta</th><th></th>
      </tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>
</aside>

<script>
"use strict";

const $ = (id) => document.getElementById(id);
const videoFileInput = $("videoFile");
const mdFileInput    = $("mdFile");
const player         = $("player");
const rowsTbody      = $("rows");
const tbl            = $("tbl");
const empty          = $("empty");
const saveBtn        = $("saveBtn");
const statusEl       = $("status");
const curTimeEl      = $("curTime");
const playingIdEl    = $("playingId");
const keepCountEl    = $("keepCount");
const totalCountEl   = $("totalCount");
const autoStopEl     = $("autoStop");

let mdText      = "";
let mdFileName  = "candidates.md";
let clips       = [];   // {idx, id, start, end, startSec, endSec, meta, keep, lineIndex}
let mdLines     = [];
let activeIdx   = -1;
let stopAt      = null;

function tsToSec(ts) {
  const m = /^(\d{2}):(\d{2}):(\d{2})\.(\d{3})$/.exec(ts.trim());
  if (!m) return NaN;
  return (+m[1]) * 3600 + (+m[2]) * 60 + (+m[3]) + (+m[4]) / 1000;
}
function secToTs(s) {
  if (!isFinite(s) || s < 0) s = 0;
  const ms = Math.round(s * 1000);
  const h = Math.floor(ms / 3_600_000);
  const m = Math.floor((ms % 3_600_000) / 60_000);
  const sec = Math.floor((ms % 60_000) / 1000);
  const mm = ms % 1000;
  const pad = (n, w=2) => String(n).padStart(w, "0");
  return `${pad(h)}:${pad(m)}:${pad(sec)}.${pad(mm,3)}`;
}

const LINE_RE = /^(\s*-\s*\[)([ xX])(\]\s*)(\S+)(\s*\|\s*)(\d{2}:\d{2}:\d{2}\.\d{3})(\s*(?:->|→|=>)\s*)(\d{2}:\d{2}:\d{2}\.\d{3})(.*)$/;

function parseChecklist(text) {
  const lines = text.split(/\r?\n/);
  const out = [];
  lines.forEach((line, i) => {
    const m = LINE_RE.exec(line);
    if (!m) return;
    const id = m[4];
    const start = m[6], end = m[8];
    const meta = m[9].replace(/^\s*\|\s*/, "").trim();
    out.push({
      idx: out.length,
      lineIndex: i,
      id,
      start, end,
      startSec: tsToSec(start),
      endSec: tsToSec(end),
      meta,
      keep: m[2].toLowerCase() === "x",
    });
  });
  return { lines, clips: out };
}

function render() {
  rowsTbody.innerHTML = "";
  if (!clips.length) {
    tbl.hidden = true; empty.hidden = false;
    totalCountEl.textContent = "0"; keepCountEl.textContent = "0";
    return;
  }
  empty.hidden = true; tbl.hidden = false;
  totalCountEl.textContent = clips.length;
  for (const c of clips) {
    const tr = document.createElement("tr");
    tr.dataset.idx = c.idx;
    if (c.idx === activeIdx) tr.classList.add("playing");
    if (c.keep) tr.classList.add("kept");

    const tdKeep = document.createElement("td");
    const cb = document.createElement("input");
    cb.type = "checkbox"; cb.checked = c.keep;
    cb.addEventListener("change", () => {
      c.keep = cb.checked;
      tr.classList.toggle("kept", c.keep);
      updateKeepCount();
    });
    tdKeep.appendChild(cb);

    const tdId = document.createElement("td");
    tdId.className = "id"; tdId.textContent = c.id;

    const tdTime = document.createElement("td");
    tdTime.className = "time";
    tdTime.textContent = `${c.start} → ${c.end}`;

    const tdMeta = document.createElement("td");
    tdMeta.className = "meta"; tdMeta.textContent = c.meta;

    const tdAct = document.createElement("td");
    tdAct.className = "row-actions";
    const playBtn = document.createElement("button");
    playBtn.textContent = "▶";
    playBtn.title = "Preview this clip";
    playBtn.addEventListener("click", () => playClip(c.idx));
    const seekBtn = document.createElement("button");
    seekBtn.textContent = "⤓";
    seekBtn.title = "Seek to start without auto-stop";
    seekBtn.addEventListener("click", () => seekClip(c.idx));
    tdAct.append(playBtn, seekBtn);

    tr.append(tdKeep, tdId, tdTime, tdMeta, tdAct);
    rowsTbody.appendChild(tr);
  }
  updateKeepCount();
}

function updateKeepCount() {
  keepCountEl.textContent = clips.filter(c => c.keep).length;
}

function setActive(idx) {
  activeIdx = idx;
  for (const tr of rowsTbody.querySelectorAll("tr")) {
    tr.classList.toggle("playing", +tr.dataset.idx === idx);
  }
  const c = clips[idx];
  playingIdEl.textContent = c ? c.id : "—";
  if (c) {
    const tr = rowsTbody.querySelector(`tr[data-idx="${idx}"]`);
    tr?.scrollIntoView({ block: "nearest", behavior: "smooth" });
  }
}

function seekClip(idx) {
  const c = clips[idx];
  if (!c || !player.src) return;
  setActive(idx);
  stopAt = null;
  player.currentTime = c.startSec;
}

function playClip(idx) {
  const c = clips[idx];
  if (!c || !player.src) return;
  setActive(idx);
  stopAt = autoStopEl.checked ? c.endSec : null;
  player.currentTime = c.startSec;
  player.play().catch(() => {});
}

player.addEventListener("timeupdate", () => {
  curTimeEl.textContent = secToTs(player.currentTime);
  if (stopAt != null && player.currentTime >= stopAt) {
    player.pause();
    stopAt = null;
  }
});

videoFileInput.addEventListener("change", () => {
  const f = videoFileInput.files?.[0];
  if (!f) return;
  if (player.src) URL.revokeObjectURL(player.src);
  player.src = URL.createObjectURL(f);
  statusEl.textContent = `Video: ${f.name}`;
});

mdFileInput.addEventListener("change", async () => {
  const f = mdFileInput.files?.[0];
  if (!f) return;
  mdFileName = f.name;
  mdText = await f.text();
  const parsed = parseChecklist(mdText);
  mdLines = parsed.lines;
  clips = parsed.clips;
  activeIdx = -1;
  render();
  saveBtn.disabled = clips.length === 0;
  statusEl.textContent = `Checklist: ${f.name} — ${clips.length} candidates`;
});

saveBtn.addEventListener("click", () => {
  const out = mdLines.slice();
  for (const c of clips) {
    const line = out[c.lineIndex];
    out[c.lineIndex] = line.replace(LINE_RE, (_m, p1, _chk, p3, ...rest) => {
      const [id, sep1, start, sep2, end, tail] = rest;
      return `${p1}${c.keep ? "x" : " "}${p3}${id}${sep1}${start}${sep2}${end}${tail}`;
    });
  }
  const blob = new Blob([out.join("\n")], { type: "text/markdown;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = mdFileName;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 500);
});

document.addEventListener("keydown", (e) => {
  if (e.target instanceof HTMLInputElement && e.target.type !== "checkbox") return;
  if (!clips.length) return;
  if (e.key === "j" || e.key === "ArrowDown") {
    e.preventDefault();
    playClip(Math.min(clips.length - 1, (activeIdx < 0 ? 0 : activeIdx + 1)));
  } else if (e.key === "k" || e.key === "ArrowUp") {
    e.preventDefault();
    playClip(Math.max(0, (activeIdx < 0 ? 0 : activeIdx - 1)));
  } else if (e.key === " ") {
    e.preventDefault();
    if (player.paused) player.play(); else player.pause();
  } else if (e.key === "x" || e.key === "X" || e.key === "Enter") {
    e.preventDefault();
    if (activeIdx >= 0) {
      const c = clips[activeIdx];
      c.keep = !c.keep;
      render();
      setActive(activeIdx);
    }
  }
});
</script>
</body>
</html>
