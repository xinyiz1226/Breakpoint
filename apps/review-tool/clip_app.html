<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Tennis edit (server)</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    font: 13px/1.45 -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    margin: 0; padding: 0;
    display: grid;
    grid-template-columns: minmax(420px, 1fr) minmax(440px, 600px);
    grid-template-rows: auto 1fr;
    height: 100vh;
  }
  header {
    grid-column: 1 / -1;
    padding: 8px 12px;
    border-bottom: 1px solid #8884;
    display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
  }
  header > * { flex: 0 0 auto; }
  header button { padding: 5px 10px; }
  #status {
    flex: 1 1 auto; min-width: 240px; text-align: right;
    opacity: .85; font-size: 12px; font-variant-numeric: tabular-nums;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .left { padding: 10px; display: flex; flex-direction: column; gap: 8px; min-height: 0; }
  video { width: 100%; max-height: 56vh; background: #000; border-radius: 6px; }
  .row { font-variant-numeric: tabular-nums; display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
  .row b { font-size: 15px; }
  .right { border-left: 1px solid #8884; overflow: auto; padding: 6px 0; }
  table { width: 100%; border-collapse: collapse; font-variant-numeric: tabular-nums; }
  th, td { padding: 4px 6px; border-bottom: 1px solid #8882; text-align: left; vertical-align: middle; }
  th { position: sticky; top: 0; background: Canvas; z-index: 1; font-size: 12px; }
  tbody tr.playing { background: #4a90e233; }
  tbody tr.kept { background: #2ecc7122; }
  td.id { font-weight: 600; white-space: nowrap; }
  td.t input {
    width: 96px; font: inherit; font-variant-numeric: tabular-nums;
    padding: 2px 4px; border: 1px solid #8884; border-radius: 4px; background: transparent;
    color: inherit;
  }
  td.t input.bad { border-color: #e74c3c; }
  td.meta { font-size: 11px; opacity: .75; }
  td.act { white-space: nowrap; }
  td.act button { padding: 2px 6px; font-size: 12px; }
  .row-actions { display: flex; gap: 3px; flex-wrap: wrap; }
  .hint { padding: 14px; opacity: .7; font-size: 12px; }
  input[type="checkbox"] { width: 17px; height: 17px; }
  .legend { font-size: 11px; opacity: .8; }
  .progress { width: 100%; height: 6px; background: #8884; border-radius: 3px; overflow: hidden; display: none; }
  .progress > div { height: 100%; background: #4a90e2; width: 0%; transition: width .15s; }
  .progress.show { display: block; }
  details.params summary { cursor: pointer; opacity: .8; font-size: 12px; }
  details.params .body { display: flex; gap: 8px; flex-wrap: wrap; padding: 6px 0; font-size: 12px; }
  details.params input[type="number"] { width: 70px; }
  .seg { border-left: 1px solid #8884; height: 22px; margin: 0 4px; }
  .picker {
    position: fixed; inset: 0; background: rgba(0,0,0,.45);
    display: none; align-items: center; justify-content: center; z-index: 10;
  }
  .picker.show { display: flex; }
  .picker .panel {
    background: Canvas; color: CanvasText; border-radius: 8px; min-width: 520px;
    max-width: 80vw; max-height: 80vh; display: flex; flex-direction: column; overflow: hidden;
  }
  .picker header { background: transparent; border-bottom: 1px solid #8884; padding: 8px 12px; }
  .picker .body { overflow: auto; padding: 6px 8px; min-height: 200px; }
  .picker .row-item {
    display: flex; gap: 8px; align-items: center; padding: 4px 6px;
    cursor: pointer; border-radius: 4px;
  }
  .picker .row-item:hover { background: #8882; }
  .picker .row-item .meta { margin-left: auto; opacity: .65; font-size: 11px; }
  .picker .crumbs { font-size: 12px; opacity: .8; word-break: break-all; }
  .picker footer { border-top: 1px solid #8884; padding: 6px 12px; display: flex; gap: 8px; }
  .badge { display: inline-block; padding: 0 6px; border-radius: 8px; font-size: 11px; background: #8884; }
  .pathline { font-family: ui-monospace, Menlo, monospace; font-size: 12px; opacity: .85; word-break: break-all; }
</style>
</head>
<body>
<header>
  <button id="pickVideo">Pick video…</button>
  <span id="videoLabel" class="pathline">No video</span>
  <span class="seg"></span>
  <button id="pickAudio">Pick audio (opt)…</button>
  <span id="audioLabel" class="pathline">—</span>
  <span class="seg"></span>
  <button id="analyzeBtn" disabled>Analyze</button>
  <details class="params"><summary>params</summary>
    <div class="body">
      <label>pre-pad <input id="prePad" type="number" value="2.5" step="0.5" min="0"/>s</label>
      <label>post-pad <input id="postPad" type="number" value="4.0" step="0.5" min="0"/>s</label>
      <label>HP cutoff <input id="hpHz" type="number" value="2500" step="100" min="50"/>Hz</label>
      <label>min hits <input id="minHits" type="number" value="3" step="1" min="2"/></label>
      <label>min int <input id="minInt" type="number" value="0.45" step="0.05" min="0.1"/>s</label>
      <label>max int <input id="maxInt" type="number" value="2.5" step="0.1" min="0.5"/>s</label>
      <label>thr ratio <input id="thrRatio" type="number" value="4" step="0.5" min="1"/></label>
      <label>min sep <input id="minSep" type="number" value="120" step="20" min="40"/>ms</label>
      <label>max cand <input id="maxCand" type="number" value="200" step="10" min="10"/></label>
    </div>
  </details>
  <span class="seg"></span>
  <button id="renderBtn" disabled>Render</button>
  <button id="cancelBtn" hidden>Cancel</button>
  <span id="status">Ready.</span>
</header>

<section class="left">
  <video id="player" controls preload="metadata"></video>
  <div class="row">
    <span>Now: <b id="curTime">00:00:00.000</b></span>
    <span>Playing: <b id="playingId">—</b></span>
    <span class="legend">▶ preview · ⤓ seek · ✂◀/✂▶ set start/end to playhead · -1s/+1s nudge</span>
    <span style="margin-left:auto" class="legend">Kept <b id="keepCount">0</b> / <span id="totalCount">0</span></span>
  </div>
  <div id="progress" class="progress"><div></div></div>
</section>

<aside class="right">
  <div id="empty" class="hint">No analysis yet. Pick a video, optionally an audio file, then click <b>Analyze</b>.</div>
  <table id="tbl" hidden>
    <thead><tr><th>Keep</th><th>ID</th><th>Start</th><th>End</th><th>Meta</th><th></th></tr></thead>
    <tbody id="rows"></tbody>
  </table>
</aside>

<!-- file picker modal -->
<div class="picker" id="picker">
  <div class="panel">
    <header>
      <div><b id="pickerTitle">Pick file</b></div>
      <div class="crumbs" id="pickerCwd"></div>
    </header>
    <div class="body" id="pickerBody"></div>
    <footer>
      <button id="pickerUp">↑ Parent</button>
      <span style="flex:1"></span>
      <button id="pickerCancel">Cancel</button>
    </footer>
  </div>
</div>

<script>
"use strict";

const $ = id => document.getElementById(id);
const player = $("player");
const rowsTbody = $("rows");
const tbl = $("tbl");
const empty = $("empty");

const state = {
  videoPath: null,
  audioPath: null,
  duration: 0,
  width: 0,
  height: 0,
  clips: [],
  activeIdx: -1,
  stopAt: null,
  curJob: null,
};

function pad(n, w=2) { return String(n).padStart(w, "0"); }
function secToTs(s) {
  if (!isFinite(s) || s < 0) s = 0;
  const ms = Math.round(s * 1000);
  const h = Math.floor(ms / 3_600_000);
  const m = Math.floor((ms % 3_600_000) / 60_000);
  const sec = Math.floor((ms % 60_000) / 1000);
  const mm = ms % 1000;
  return `${pad(h)}:${pad(m)}:${pad(sec)}.${pad(mm,3)}`;
}
function tsToSec(ts) {
  const m = /^(\d{1,2}):(\d{2}):(\d{2})(?:\.(\d{1,3}))?$/.exec(ts.trim());
  if (!m) return NaN;
  const ms = m[4] ? Number((m[4]+"000").slice(0,3)) : 0;
  return (+m[1])*3600 + (+m[2])*60 + (+m[3]) + ms/1000;
}
function setStatus(msg) { $("status").textContent = msg; }
function setProgress(frac) {
  const el = $("progress");
  if (frac == null) { el.classList.remove("show"); return; }
  el.classList.add("show");
  el.firstElementChild.style.width = `${Math.max(0, Math.min(1, frac))*100}%`;
}
function api(path, body) {
  return fetch(path, body ? {method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify(body)} : undefined)
    .then(async r => {
      const ct = r.headers.get("Content-Type") || "";
      const data = ct.includes("json") ? await r.json() : await r.text();
      if (!r.ok) throw new Error((data && data.error) || (typeof data === "string" ? data : `HTTP ${r.status}`));
      return data;
    });
}

/* ---------------- file picker ---------------- */
const picker = $("picker");
let pickerKind = "video"; // 'video' | 'audio'
let pickerCwd = null;

async function openPicker(kind, startDir) {
  pickerKind = kind;
  $("pickerTitle").textContent = kind === "video" ? "Pick video file" : "Pick audio file (optional)";
  picker.classList.add("show");
  await loadPicker(startDir || "");
}
function closePicker() { picker.classList.remove("show"); }
$("pickerCancel").addEventListener("click", closePicker);
picker.addEventListener("click", e => { if (e.target === picker) closePicker(); });
$("pickerUp").addEventListener("click", () => {
  if (pickerCwd) loadPicker(pickerCwd.parent || "");
});

async function loadPicker(dir) {
  try {
    const data = await api(`/api/browse?dir=${encodeURIComponent(dir)}`);
    pickerCwd = { cwd: data.cwd, parent: data.parent };
    $("pickerCwd").textContent = data.cwd;
    $("pickerUp").disabled = !data.parent;
    const body = $("pickerBody"); body.innerHTML = "";
    const wantedExts = pickerKind === "video"
      ? new Set(["mp4","mov","m4v","mkv","webm","avi"])
      : new Set(["m4a","aac","mp3","wav","flac","ogg","mp4","mov"]); // allow video as audio source too
    for (const ent of data.entries) {
      const ext = (ent.name.split(".").pop() || "").toLowerCase();
      const showFile = !ent.is_dir && wantedExts.has(ext);
      if (!ent.is_dir && !showFile) continue;
      const div = document.createElement("div");
      div.className = "row-item";
      const icon = ent.is_dir ? "📁" : (ent.kind === "video" ? "🎞" : ent.kind === "audio" ? "🔊" : "📄");
      const sizeStr = ent.size != null ? prettySize(ent.size) : "";
      div.innerHTML = `<span>${icon}</span><span>${escapeHTML(ent.name)}</span><span class="meta">${sizeStr}</span>`;
      div.addEventListener("click", () => {
        if (ent.is_dir) loadPicker(ent.path);
        else choosePicked(ent.path);
      });
      body.appendChild(div);
    }
  } catch (e) {
    setStatus("Browse failed: " + e.message);
  }
}
function prettySize(n) {
  if (n < 1024) return n+"B";
  const u = ["K","M","G","T"]; let i=-1;
  while (n >= 1024 && i < u.length-1) { n /= 1024; i++; }
  return n.toFixed(n<10?1:0) + u[i] + "B";
}
function escapeHTML(s) { return s.replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c])); }
function choosePicked(path) {
  closePicker();
  if (pickerKind === "video") {
    state.videoPath = path;
    $("videoLabel").textContent = path;
    player.src = `/file?path=${encodeURIComponent(path)}`;
    state.clips = []; state.activeIdx = -1; renderTable();
    $("analyzeBtn").disabled = false;
    $("renderBtn").disabled = true;
    setStatus(`Video: ${path}`);
  } else {
    state.audioPath = path;
    $("audioLabel").textContent = path;
    setStatus(`Audio for analysis: ${path}`);
  }
}
$("pickVideo").addEventListener("click", () => {
  const start = state.videoPath ? parentDir(state.videoPath) : "";
  openPicker("video", start);
});
$("pickAudio").addEventListener("click", () => {
  const start = state.audioPath ? parentDir(state.audioPath) :
                state.videoPath ? parentDir(state.videoPath) : "";
  openPicker("audio", start);
});
function parentDir(p) {
  const i = p.lastIndexOf("/");
  return i > 0 ? p.slice(0, i) : "";
}

/* ---------------- video preview ---------------- */
player.addEventListener("loadedmetadata", () => {
  state.duration = player.duration || 0;
  state.width = player.videoWidth;
  state.height = player.videoHeight;
});
player.addEventListener("timeupdate", () => {
  $("curTime").textContent = secToTs(player.currentTime);
  if (state.stopAt != null && player.currentTime >= state.stopAt) {
    player.pause();
    state.stopAt = null;
  }
});

/* ---------------- analyze ---------------- */
$("analyzeBtn").addEventListener("click", async () => {
  if (!state.videoPath) return;
  $("analyzeBtn").disabled = true;
  setProgress(0.05);
  setStatus("Submitting analyze job…");
  try {
    const params = {
      pre_pad: +$("prePad").value, post_pad: +$("postPad").value,
      hp_hz: +$("hpHz").value, min_hits: +$("minHits").value,
      min_interval: +$("minInt").value, max_interval: +$("maxInt").value,
      thr_ratio: +$("thrRatio").value, min_sep_ms: +$("minSep").value,
      max_candidates: +$("maxCand").value,
    };
    const resp = await api("/api/analyze", {
      video_path: state.videoPath,
      audio_path: state.audioPath || null,
      params,
    });
    state.curJob = resp.job.id;
    $("cancelBtn").hidden = false;
    const job = await pollJob(resp.job.id);
    if (job.state === "done") {
      const clips = (job.result.clips || []).map((c, i) => ({
        idx: i, id: c.id, start: c.start, end: c.end,
        startSec: tsToSec(c.start), endSec: tsToSec(c.end),
        reason: c.reason, keep: false,
      }));
      state.clips = clips;
      state.activeIdx = -1;
      renderTable();
      setStatus(`Analyze done: ${clips.length} candidates.`);
      $("renderBtn").disabled = clips.length === 0;
    } else if (job.state === "cancelled") {
      setStatus("Analyze cancelled.");
    } else {
      setStatus("Analyze failed: " + (job.error || "unknown"));
    }
  } catch (e) {
    setStatus("Analyze error: " + e.message);
  } finally {
    setProgress(null);
    $("cancelBtn").hidden = true;
    state.curJob = null;
    $("analyzeBtn").disabled = false;
  }
});

/* ---------------- render ---------------- */
$("renderBtn").addEventListener("click", async () => {
  const kept = state.clips
    .filter(c => c.keep)
    .sort((a,b) => a.startSec - b.startSec)
    .map(c => ({ id: c.id, start: secToTs(c.startSec), end: secToTs(c.endSec) }));
  if (!kept.length) { setStatus("No clips checked."); return; }
  $("renderBtn").disabled = true; $("analyzeBtn").disabled = true;
  setProgress(0.02);
  setStatus(`Submitting render job (${kept.length} clips)…`);
  try {
    const resp = await api("/api/render", {
      video_path: state.videoPath,
      clips: kept,
      crf: 18, preset: "medium",
    });
    state.curJob = resp.job.id;
    $("cancelBtn").hidden = false;
    const job = await pollJob(resp.job.id);
    if (job.state === "done") {
      const out = job.result.output;
      setStatus("Render done: " + out);
      // offer to open output in player.
      if (confirm("Render done.\n" + out + "\n\nLoad output into the player?")) {
        player.src = `/file?path=${encodeURIComponent(out)}`;
        player.currentTime = 0;
      }
    } else if (job.state === "cancelled") {
      setStatus("Render cancelled.");
    } else {
      setStatus("Render failed: " + (job.error || "unknown"));
    }
  } catch (e) {
    setStatus("Render error: " + e.message);
  } finally {
    setProgress(null);
    $("cancelBtn").hidden = true;
    state.curJob = null;
    $("analyzeBtn").disabled = false;
    $("renderBtn").disabled = state.clips.filter(c => c.keep).length === 0;
  }
});

$("cancelBtn").addEventListener("click", async () => {
  if (!state.curJob) return;
  try { await api("/api/cancel", { id: state.curJob }); } catch {}
});

async function pollJob(id) {
  while (true) {
    await new Promise(r => setTimeout(r, 500));
    const data = await api(`/api/job?id=${encodeURIComponent(id)}`);
    const job = data.job;
    setProgress(job.progress);
    if (job.message) setStatus(`[${job.kind}] ${job.message}`);
    if (job.state === "done" || job.state === "error" || job.state === "cancelled") {
      return job;
    }
  }
}

/* ---------------- table & editing ---------------- */
function renderTable() {
  rowsTbody.innerHTML = "";
  $("totalCount").textContent = state.clips.length;
  if (!state.clips.length) {
    tbl.hidden = true; empty.hidden = false;
    $("keepCount").textContent = "0"; return;
  }
  empty.hidden = true; tbl.hidden = false;
  for (const c of state.clips) {
    const tr = document.createElement("tr");
    tr.dataset.idx = c.idx;
    if (c.idx === state.activeIdx) tr.classList.add("playing");
    if (c.keep) tr.classList.add("kept");

    const tdKeep = document.createElement("td");
    const cb = document.createElement("input");
    cb.type = "checkbox"; cb.checked = c.keep;
    cb.addEventListener("change", () => {
      c.keep = cb.checked; tr.classList.toggle("kept", c.keep); updateKeepCount();
    });
    tdKeep.appendChild(cb);

    const tdId = document.createElement("td");
    tdId.className = "id"; tdId.textContent = c.id;

    const tdStart = makeTimeCell(c, "startSec");
    const tdEnd = makeTimeCell(c, "endSec");

    const tdMeta = document.createElement("td");
    tdMeta.className = "meta";
    tdMeta.textContent = metaText(c);

    const tdAct = document.createElement("td");
    tdAct.className = "act";
    const wrap = document.createElement("div"); wrap.className = "row-actions";
    wrap.append(
      mkBtn("▶", "Preview", () => playClip(c.idx)),
      mkBtn("⤓", "Seek to start", () => seekTo(c.idx, "start")),
      mkBtn("-1s", "Start −1s", () => nudge(c, "startSec", -1)),
      mkBtn("+1s", "Start +1s", () => nudge(c, "startSec", +1)),
      mkBtn("✂◀", "Set start = playhead", () => setFromPlayhead(c, "startSec")),
      mkBtn("✂▶", "Set end = playhead", () => setFromPlayhead(c, "endSec")),
      mkBtn("E-1", "End −1s", () => nudge(c, "endSec", -1)),
      mkBtn("E+1", "End +1s", () => nudge(c, "endSec", +1)),
    );
    tdAct.appendChild(wrap);
    tr.append(tdKeep, tdId, tdStart, tdEnd, tdMeta, tdAct);
    rowsTbody.appendChild(tr);
  }
  updateKeepCount();
}
function metaText(c) {
  const dur = c.endSec - c.startSec;
  return `dur=${dur.toFixed(1)}s · ${c.reason || ""}`;
}
function makeTimeCell(c, key) {
  const td = document.createElement("td"); td.className = "t";
  const inp = document.createElement("input");
  inp.value = secToTs(c[key]); inp.spellcheck = false;
  inp.addEventListener("change", () => {
    const v = tsToSec(inp.value);
    if (!isFinite(v)) { inp.classList.add("bad"); return; }
    inp.classList.remove("bad");
    c[key] = clampTime(c, key, v);
    inp.value = secToTs(c[key]);
    refreshMeta(c);
  });
  td.appendChild(inp); td._input = inp; return td;
}
function clampTime(c, key, v) {
  v = Math.max(0, Math.min(state.duration || v, v));
  if (key === "startSec") v = Math.min(v, c.endSec - 0.05);
  if (key === "endSec") v = Math.max(v, c.startSec + 0.05);
  return v;
}
function refreshMeta(c) {
  const tr = rowsTbody.querySelector(`tr[data-idx="${c.idx}"]`);
  if (!tr) return;
  tr.children[2]._input.value = secToTs(c.startSec);
  tr.children[3]._input.value = secToTs(c.endSec);
  tr.children[4].textContent = metaText(c);
}
function nudge(c, key, d) { c[key] = clampTime(c, key, c[key]+d); refreshMeta(c); }
function setFromPlayhead(c, key) { c[key] = clampTime(c, key, player.currentTime); refreshMeta(c); }
function seekTo(idx, which) {
  const c = state.clips[idx]; if (!c) return;
  setActive(idx); state.stopAt = null;
  player.currentTime = which === "end" ? c.endSec : c.startSec;
}
function playClip(idx) {
  const c = state.clips[idx]; if (!c) return;
  setActive(idx); state.stopAt = c.endSec;
  player.currentTime = c.startSec;
  player.play().catch(()=>{});
}
function setActive(idx) {
  state.activeIdx = idx;
  for (const tr of rowsTbody.querySelectorAll("tr")) {
    tr.classList.toggle("playing", +tr.dataset.idx === idx);
  }
  const c = state.clips[idx];
  $("playingId").textContent = c ? c.id : "—";
  if (c) rowsTbody.querySelector(`tr[data-idx="${idx}"]`)?.scrollIntoView({block:"nearest"});
}
function updateKeepCount() {
  const n = state.clips.filter(c => c.keep).length;
  $("keepCount").textContent = n;
  $("renderBtn").disabled = n === 0 || !state.videoPath;
}
function mkBtn(label, title, fn) {
  const b = document.createElement("button");
  b.textContent = label; b.title = title;
  b.addEventListener("click", fn);
  return b;
}
document.addEventListener("keydown", e => {
  const t = e.target;
  if (t instanceof HTMLInputElement && t.type !== "checkbox") return;
  if (!state.clips.length) return;
  if (e.key === "j" || e.key === "ArrowDown") { e.preventDefault(); playClip(Math.min(state.clips.length-1, state.activeIdx<0?0:state.activeIdx+1)); }
  else if (e.key === "k" || e.key === "ArrowUp") { e.preventDefault(); playClip(Math.max(0, state.activeIdx<0?0:state.activeIdx-1)); }
  else if (e.key === " ") { e.preventDefault(); if (player.paused) player.play(); else player.pause(); }
  else if (e.key === "x" || e.key === "X" || e.key === "Enter") {
    e.preventDefault();
    if (state.activeIdx >= 0) { const c = state.clips[state.activeIdx]; c.keep = !c.keep; renderTable(); setActive(state.activeIdx); }
  }
});

(async () => {
  try {
    const info = await api("/api/info");
    setStatus(`Backend ready · root: ${info.root}`);
  } catch (e) {
    setStatus("Backend not reachable: " + e.message);
  }
})();
</script>
</body>
</html>
