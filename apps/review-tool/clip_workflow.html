<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Tennis edit workflow</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    font: 13px/1.45 -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    margin: 0; padding: 0;
    display: grid;
    grid-template-columns: minmax(380px, 1fr) minmax(420px, 560px);
    grid-template-rows: auto 1fr;
    height: 100vh;
  }
  header {
    grid-column: 1 / -1;
    padding: 8px 12px;
    border-bottom: 1px solid #8884;
    display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
  }
  header > * { flex: 0 0 auto; }
  header label.file { display: inline-flex; align-items: center; gap: 6px; }
  header button { padding: 5px 10px; }
  #status {
    flex: 1 1 auto; min-width: 200px; text-align: right;
    opacity: .8; font-size: 12px; font-variant-numeric: tabular-nums;
  }
  .left { padding: 10px; display: flex; flex-direction: column; gap: 8px; min-height: 0; }
  video, canvas.preview { width: 100%; max-height: 56vh; background: #000; border-radius: 6px; }
  canvas.preview { display: none; }
  .now { font-variant-numeric: tabular-nums; display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
  .now b { font-size: 15px; }
  .right { border-left: 1px solid #8884; overflow: auto; padding: 6px 0; }
  table { width: 100%; border-collapse: collapse; font-variant-numeric: tabular-nums; }
  th, td { padding: 4px 6px; border-bottom: 1px solid #8882; text-align: left; vertical-align: middle; }
  th { position: sticky; top: 0; background: Canvas; z-index: 1; font-size: 12px; }
  tbody tr.playing { background: #4a90e233; }
  tbody tr.kept { background: #2ecc7122; }
  td.id { font-weight: 600; white-space: nowrap; }
  td.t input {
    width: 96px; font: inherit; font-variant-numeric: tabular-nums;
    padding: 2px 4px; border: 1px solid #8884; border-radius: 4px; background: transparent;
    color: inherit;
  }
  td.t input.bad { border-color: #e74c3c; }
  td.meta { font-size: 11px; opacity: .75; }
  td.act { white-space: nowrap; }
  td.act button { padding: 2px 6px; font-size: 12px; }
  .row-actions { display: flex; gap: 3px; flex-wrap: wrap; }
  .hint { padding: 14px; opacity: .7; font-size: 12px; }
  input[type="checkbox"] { width: 17px; height: 17px; }
  .legend { font-size: 11px; opacity: .8; }
  .pill { display: inline-block; padding: 1px 6px; border-radius: 8px; font-size: 11px; background: #8884; }
  .progress { width: 100%; height: 6px; background: #8884; border-radius: 3px; overflow: hidden; display: none; }
  .progress > div { height: 100%; background: #4a90e2; width: 0%; transition: width .15s; }
  .progress.show { display: block; }
  .toolbar-group { display: inline-flex; align-items: center; gap: 4px; }
  .seg { border-left: 1px solid #8884; height: 22px; margin: 0 4px; }
  details.params { margin-left: 4px; }
  details.params summary { cursor: pointer; opacity: .8; font-size: 12px; }
  details.params .body { display: flex; gap: 8px; flex-wrap: wrap; padding: 6px 0; font-size: 12px; }
  details.params input[type="number"] { width: 70px; }
  .danger { color: #e74c3c; }
</style>
</head>
<body>
<header>
  <label class="file">Video <input type="file" id="videoFile" accept="video/*" /></label>
  <label class="file" title="Optional: smaller audio extracted from the video. Required for files >2GB.">
    Audio (opt) <input type="file" id="audioFile" accept="audio/*,.m4a,.aac,.wav,.mp3" />
  </label>
  <button id="analyzeBtn" disabled>Analyze audio</button>
  <span class="seg"></span>
  <label class="toolbar-group">Pre-pad <input id="prePad" type="number" value="2.5" step="0.5" min="0" style="width:60px"/>s</label>
  <label class="toolbar-group">Post-pad <input id="postPad" type="number" value="4.0" step="0.5" min="0" style="width:60px"/>s</label>
  <details class="params"><summary>more params</summary>
    <div class="body">
      <label>HP cutoff <input id="hpHz" type="number" value="2500" step="100" min="50"/>Hz</label>
      <label>min hits <input id="minHits" type="number" value="3" step="1" min="2"/></label>
      <label>min interval <input id="minInt" type="number" value="0.45" step="0.05" min="0.1"/>s</label>
      <label>max interval <input id="maxInt" type="number" value="2.5" step="0.1" min="0.5"/>s</label>
      <label>thr ratio <input id="thrRatio" type="number" value="4" step="0.5" min="1"/></label>
      <label>min sep <input id="minSep" type="number" value="120" step="20" min="40"/>ms</label>
    </div>
  </details>
  <span class="seg"></span>
  <button id="renderBtn" disabled title="Render kept clips into one video, in-browser (slow, realtime)">▶ Render video</button>
  <button id="exportMdBtn" disabled title="Download checklist with edits, render via python">Export .md</button>
  <button id="cancelBtn" hidden>Cancel</button>
  <span id="status">Pick a video to start.</span>
</header>

<section class="left">
  <video id="player" controls preload="metadata" crossorigin="anonymous"></video>
  <canvas id="renderCanvas" class="preview"></canvas>
  <div class="now">
    <span>Now: <b id="curTime">00:00:00.000</b></span>
    <span>Playing: <b id="playingId">—</b></span>
    <span class="legend">Click ▶ to preview a clip; ⤓ seek; ✂ trim start/end to playhead.</span>
    <span style="margin-left:auto" class="legend">Kept <b id="keepCount">0</b> / <span id="totalCount">0</span></span>
  </div>
  <div id="progress" class="progress"><div></div></div>
</section>

<aside class="right">
  <div id="empty" class="hint">No analysis yet. Pick a video and click <b>Analyze audio</b>.</div>
  <pre id="ffmpegHint" class="hint" hidden style="white-space:pre-wrap;background:#8881;padding:8px;border-radius:4px;font-size:12px;"></pre>
  <table id="tbl" hidden>
    <thead>
      <tr>
        <th>Keep</th><th>ID</th><th>Start</th><th>End</th><th>Meta</th><th></th>
      </tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>
</aside>

<script>
"use strict";
/* ------------------------------------------------------------------ */
/* Utilities                                                          */
/* ------------------------------------------------------------------ */
const $ = id => document.getElementById(id);

function pad(n, w=2) { return String(n).padStart(w, "0"); }
function secToTs(s) {
  if (!isFinite(s) || s < 0) s = 0;
  const ms = Math.round(s * 1000);
  const h = Math.floor(ms / 3_600_000);
  const m = Math.floor((ms % 3_600_000) / 60_000);
  const sec = Math.floor((ms % 60_000) / 1000);
  const mm = ms % 1000;
  return `${pad(h)}:${pad(m)}:${pad(sec)}.${pad(mm,3)}`;
}
function tsToSec(ts) {
  const m = /^(\d{1,2}):(\d{2}):(\d{2})(?:\.(\d{1,3}))?$/.exec(ts.trim());
  if (!m) return NaN;
  const ms = m[4] ? Number((m[4] + "000").slice(0,3)) : 0;
  return (+m[1]) * 3600 + (+m[2]) * 60 + (+m[3]) + ms / 1000;
}
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
function setStatus(msg) { $("status").textContent = msg; }
function setProgress(frac) {
  const el = $("progress");
  if (frac == null) { el.classList.remove("show"); return; }
  el.classList.add("show");
  el.firstElementChild.style.width = `${Math.max(0, Math.min(1, frac)) * 100}%`;
}

/* ------------------------------------------------------------------ */
/* Audio analysis (browser-side port of generate_manifest_draft.py)   */
/* ------------------------------------------------------------------ */
async function readFileAsArrayBuffer(file) {
  // Try modern API first.
  try {
    if (typeof file.arrayBuffer === "function") {
      return await file.arrayBuffer();
    }
  } catch (e) {
    console.warn("File.arrayBuffer failed, falling back to FileReader:", e);
  }
  // Fallback 1: FileReader.
  try {
    return await new Promise((resolve, reject) => {
      const fr = new FileReader();
      fr.onerror = () => reject(fr.error || new Error("FileReader error"));
      fr.onload = () => resolve(fr.result);
      fr.readAsArrayBuffer(file);
    });
  } catch (e) {
    console.warn("FileReader failed, falling back to fetch(objectURL):", e);
  }
  // Fallback 2: fetch the object URL.
  const url = URL.createObjectURL(file);
  try {
    const r = await fetch(url);
    if (!r.ok) throw new Error("fetch status " + r.status);
    return await r.arrayBuffer();
  } finally {
    URL.revokeObjectURL(url);
  }
}

async function decodeMonoBandpassed(file, opts) {
  // Decode whole file to AudioBuffer at original rate, then offline-render
  // through a highpass biquad and downmix to mono at a low sample rate.
  setStatus("Reading file…");
  let arrayBuf;
  try {
    arrayBuf = await readFileAsArrayBuffer(file);
  } catch (e) {
    throw new Error(
      "Could not read the video file (" + (e && e.message || e) + "). " +
      "Try copying the file to a normal folder (e.g. ~/Movies), reload the page, and pick it again."
    );
  }
  setStatus("Decoding audio…");
  const decodeCtx = new (window.AudioContext || window.webkitAudioContext)();
  let decoded;
  try {
    decoded = await decodeCtx.decodeAudioData(arrayBuf.slice(0));
  } catch (e) {
    throw new Error(
      "decodeAudioData failed (" + (e && e.message || e) + "). " +
      "The browser may not support this file's audio codec; try Safari for .mov, or transcode the audio to AAC."
    );
  } finally {
    decodeCtx.close();
  }

  const targetRate = 22050;
  const offline = new OfflineAudioContext(1, Math.ceil(decoded.duration * targetRate), targetRate);
  const src = offline.createBufferSource();
  src.buffer = decoded;

  const hp = offline.createBiquadFilter();
  hp.type = "highpass";
  hp.frequency.value = opts.hpHz;
  hp.Q.value = 0.7;

  const lp = offline.createBiquadFilter();
  lp.type = "lowpass";
  lp.frequency.value = 10000;
  lp.Q.value = 0.7;

  // Mono downmix happens because destination has 1 channel.
  src.connect(hp); hp.connect(lp); lp.connect(offline.destination);
  src.start();
  setStatus("Filtering audio…");
  const rendered = await offline.startRendering();
  return { samples: rendered.getChannelData(0), sampleRate: targetRate, duration: rendered.duration };
}

function detectOnsets(samples, sampleRate, opts) {
  // Short-window energy envelope (proxy for spectral flux on band-passed signal).
  const winLen = 1024;
  const hop = 256;
  const frames = Math.max(1, Math.floor((samples.length - winLen) / hop) + 1);
  const env = new Float32Array(frames);
  for (let i = 0; i < frames; i++) {
    let sum = 0;
    const off = i * hop;
    for (let j = 0; j < winLen; j++) {
      const v = samples[off + j];
      sum += v * v;
    }
    env[i] = Math.sqrt(sum / winLen);
  }
  // Positive flux of envelope.
  const flux = new Float32Array(frames);
  for (let i = 1; i < frames; i++) {
    const d = env[i] - env[i-1];
    flux[i] = d > 0 ? d : 0;
  }
  // Threshold = median + thrRatio * MAD.
  const sorted = Float32Array.from(flux).sort();
  const median = sorted[Math.floor(sorted.length/2)];
  const dev = new Float32Array(frames);
  for (let i = 0; i < frames; i++) dev[i] = Math.abs(flux[i] - median);
  const sortedDev = Float32Array.from(dev).sort();
  const mad = sortedDev[Math.floor(sortedDev.length/2)] + 1e-9;
  const threshold = median + opts.thrRatio * mad;

  const frameSeconds = hop / sampleRate;
  const minSepFrames = Math.max(1, Math.round((opts.minSepMs/1000) / frameSeconds));
  const onsets = [];
  let lastIdx = -minSepFrames;
  for (let i = 1; i < frames - 1; i++) {
    if (flux[i] < threshold) continue;
    if (!(flux[i] > flux[i-1] && flux[i] >= flux[i+1])) continue;
    if (i - lastIdx < minSepFrames) {
      if (flux[i] > flux[lastIdx]) {
        lastIdx = i;
        onsets[onsets.length-1] = i * frameSeconds;
      }
      continue;
    }
    onsets.push(i * frameSeconds);
    lastIdx = i;
  }
  return onsets;
}

function groupSequences(onsets, opts) {
  if (!onsets.length) return [];
  const seqs = [];
  let chain = [onsets[0]];
  let intervals = [];
  function flush() {
    if (chain.length >= opts.minHits) {
      const mean = intervals.length ? intervals.reduce((a,b)=>a+b,0)/intervals.length : 0;
      let variance = 0;
      if (intervals.length) {
        for (const v of intervals) variance += (v-mean)*(v-mean);
        variance /= intervals.length;
      }
      const std = Math.sqrt(variance);
      const jitter = mean > 0 ? std/mean : 1.0;
      if (jitter <= 0.9) {
        const score = chain.length * (1.0 / (1.0 + jitter));
        seqs.push({ first: chain[0], last: chain[chain.length-1], hits: chain.length, score });
      }
    }
  }
  for (let i = 1; i < onsets.length; i++) {
    const gap = onsets[i] - onsets[i-1];
    if (gap >= opts.minInt && gap <= opts.maxInt) {
      chain.push(onsets[i]); intervals.push(gap);
    } else {
      flush(); chain = [onsets[i]]; intervals = [];
    }
  }
  flush();
  return seqs;
}

function buildCandidates(seqs, duration, prePad, postPad, mergeGap=2.0) {
  if (!seqs.length) return [];
  seqs = [...seqs].sort((a,b) => a.first - b.first);
  const merged = [];
  for (const s of seqs) {
    const prev = merged[merged.length-1];
    if (prev && s.first - prev.last <= mergeGap) {
      prev.last = s.last;
      prev.hits += s.hits;
      prev.score += s.score;
    } else {
      merged.push({...s});
    }
  }
  return merged.map((m, i) => ({
    idx: i,
    id: `AUTO-${pad(i+1, 3)}`,
    startSec: Math.max(0, m.first - prePad),
    endSec: Math.min(duration, m.last + postPad),
    hits: m.hits,
    score: m.score,
    keep: false,
  }));
}

/* ------------------------------------------------------------------ */
/* App state                                                          */
/* ------------------------------------------------------------------ */
const state = {
  videoFile: null,
  audioFile: null,
  videoUrl: null,
  duration: 0,
  width: 0,
  height: 0,
  clips: [],
  activeIdx: -1,
  stopAt: null,
  rendering: false,
  cancelRender: false,
  audioCtx: null,
  mediaSrcNode: null,
  speakerGain: null,
};

const player = $("player");
const rowsTbody = $("rows");
const tbl = $("tbl");
const empty = $("empty");

/* ------------------------------------------------------------------ */
/* Wiring video file                                                  */
/* ------------------------------------------------------------------ */
$("videoFile").addEventListener("change", () => {
  const f = $("videoFile").files?.[0];
  if (!f) return;
  state.videoFile = f;
  if (state.videoUrl) URL.revokeObjectURL(state.videoUrl);
  state.videoUrl = URL.createObjectURL(f);
  player.src = state.videoUrl;
  state.clips = []; state.activeIdx = -1; renderTable();
  $("analyzeBtn").disabled = false;
  $("renderBtn").disabled = true;
  $("exportMdBtn").disabled = true;

  const GB = 1024 * 1024 * 1024;
  const hint = $("ffmpegHint");
  if (f.size > 1.5 * GB && !state.audioFile) {
    const stem = f.name.replace(/\.[^.]+$/, "");
    hint.hidden = false;
    hint.textContent =
      `Heads-up: this video is ${(f.size/GB).toFixed(2)} GB — too large for the browser to load whole.\n` +
      `Extract a small audio companion first, then pick it as "Audio (opt)":\n\n` +
      `ffmpeg -i "${f.name}" -vn -ac 1 -ar 22050 -c:a aac -b:a 96k "${stem}.audio.m4a"`;
  } else {
    hint.hidden = true;
  }
  setStatus(`Video: ${f.name}${f.size > 1.5*GB ? " (large — see hint)" : ""}`);
});

$("audioFile").addEventListener("change", () => {
  const f = $("audioFile").files?.[0];
  state.audioFile = f || null;
  $("ffmpegHint").hidden = !!f;
  if (f) setStatus(`Audio for analysis: ${f.name}`);
});

player.addEventListener("loadedmetadata", () => {
  state.duration = player.duration || 0;
  state.width = player.videoWidth;
  state.height = player.videoHeight;
});

player.addEventListener("timeupdate", () => {
  $("curTime").textContent = secToTs(player.currentTime);
  if (state.stopAt != null && player.currentTime >= state.stopAt) {
    player.pause();
    state.stopAt = null;
  }
});

/* ------------------------------------------------------------------ */
/* Analyze                                                            */
/* ------------------------------------------------------------------ */
$("analyzeBtn").addEventListener("click", async () => {
  if (!state.videoFile) return;
  const fileForAudio = state.audioFile || state.videoFile;
  const GB = 1024 * 1024 * 1024;
  if (!state.audioFile && state.videoFile.size > 1.8 * GB) {
    setStatus("Video too large for in-browser decoding — please load an extracted audio file (see hint).");
    $("ffmpegHint").hidden = false;
    return;
  }
  $("analyzeBtn").disabled = true;
  setProgress(0.05);
  try {
    const opts = {
      hpHz: +$("hpHz").value || 2500,
      thrRatio: +$("thrRatio").value || 4,
      minSepMs: +$("minSep").value || 120,
      minHits: +$("minHits").value || 3,
      minInt: +$("minInt").value || 0.45,
      maxInt: +$("maxInt").value || 2.5,
    };
    const { samples, sampleRate, duration } = await decodeMonoBandpassed(fileForAudio, opts);
    setStatus(`Audio decoded: ${duration.toFixed(1)}s @ ${sampleRate}Hz · running onset detection…`);
    setProgress(0.6);
    await sleep(0); // yield UI
    const onsets = detectOnsets(samples, sampleRate, opts);
    setProgress(0.8);
    await sleep(0);
    const seqs = groupSequences(onsets, opts);
    const prePad = +$("prePad").value || 0;
    const postPad = +$("postPad").value || 0;
    state.clips = buildCandidates(seqs, duration, prePad, postPad);
    state.activeIdx = -1;
    renderTable();
    setProgress(null);
    setStatus(`Onsets: ${onsets.length} · sequences: ${seqs.length} · candidates: ${state.clips.length}`);
    $("renderBtn").disabled = state.clips.length === 0;
    $("exportMdBtn").disabled = state.clips.length === 0;
  } catch (e) {
    console.error(e);
    setStatus("Analyze failed: " + (e && e.message || e));
    setProgress(null);
  } finally {
    $("analyzeBtn").disabled = false;
  }
});

/* ------------------------------------------------------------------ */
/* Table rendering / interaction                                      */
/* ------------------------------------------------------------------ */
function renderTable() {
  rowsTbody.innerHTML = "";
  $("totalCount").textContent = state.clips.length;
  if (!state.clips.length) {
    tbl.hidden = true; empty.hidden = false;
    $("keepCount").textContent = "0";
    return;
  }
  empty.hidden = true; tbl.hidden = false;
  for (const c of state.clips) {
    const tr = document.createElement("tr");
    tr.dataset.idx = c.idx;
    if (c.idx === state.activeIdx) tr.classList.add("playing");
    if (c.keep) tr.classList.add("kept");

    const tdKeep = document.createElement("td");
    const cb = document.createElement("input");
    cb.type = "checkbox"; cb.checked = c.keep;
    cb.addEventListener("change", () => { c.keep = cb.checked; tr.classList.toggle("kept", c.keep); updateKeepCount(); });
    tdKeep.appendChild(cb);

    const tdId = document.createElement("td");
    tdId.className = "id"; tdId.textContent = c.id;

    const tdStart = makeTimeCell(c, "startSec");
    const tdEnd   = makeTimeCell(c, "endSec");

    const tdMeta = document.createElement("td");
    tdMeta.className = "meta";
    tdMeta.textContent = `dur=${(c.endSec-c.startSec).toFixed(1)}s · hits=${c.hits} · s=${c.score.toFixed(2)}`;

    const tdAct = document.createElement("td");
    tdAct.className = "act";
    const wrap = document.createElement("div"); wrap.className = "row-actions";
    wrap.append(
      mkBtn("▶", "Preview clip (auto-stop at end)", () => playClip(c.idx)),
      mkBtn("⤓", "Seek to start", () => seekTo(c.idx, "start")),
      mkBtn("-1s", "Start −1s", () => nudge(c, "startSec", -1)),
      mkBtn("+1s", "Start +1s", () => nudge(c, "startSec", +1)),
      mkBtn("✂◀", "Set start = current playhead", () => setFromPlayhead(c, "startSec")),
      mkBtn("✂▶", "Set end = current playhead", () => setFromPlayhead(c, "endSec")),
      mkBtn("E-1", "End −1s", () => nudge(c, "endSec", -1)),
      mkBtn("E+1", "End +1s", () => nudge(c, "endSec", +1)),
    );
    tdAct.appendChild(wrap);

    tr.append(tdKeep, tdId, tdStart, tdEnd, tdMeta, tdAct);
    rowsTbody.appendChild(tr);
  }
  updateKeepCount();
}
function mkBtn(label, title, fn) {
  const b = document.createElement("button");
  b.textContent = label; b.title = title;
  b.addEventListener("click", fn);
  return b;
}
function makeTimeCell(c, key) {
  const td = document.createElement("td"); td.className = "t";
  const inp = document.createElement("input");
  inp.value = secToTs(c[key]);
  inp.spellcheck = false;
  inp.addEventListener("change", () => {
    const v = tsToSec(inp.value);
    if (!isFinite(v)) { inp.classList.add("bad"); return; }
    inp.classList.remove("bad");
    c[key] = clampTime(c, key, v);
    inp.value = secToTs(c[key]);
    refreshMeta(c);
  });
  td.appendChild(inp);
  td._input = inp;
  return td;
}
function clampTime(c, key, v) {
  v = Math.max(0, Math.min(state.duration || v, v));
  if (key === "startSec") v = Math.min(v, c.endSec - 0.05);
  if (key === "endSec") v = Math.max(v, c.startSec + 0.05);
  return v;
}
function refreshMeta(c) {
  const tr = rowsTbody.querySelector(`tr[data-idx="${c.idx}"]`);
  if (!tr) return;
  const startCell = tr.children[2], endCell = tr.children[3], metaCell = tr.children[4];
  startCell._input.value = secToTs(c.startSec);
  endCell._input.value = secToTs(c.endSec);
  metaCell.textContent = `dur=${(c.endSec-c.startSec).toFixed(1)}s · hits=${c.hits} · s=${c.score.toFixed(2)}`;
}
function nudge(c, key, delta) {
  c[key] = clampTime(c, key, c[key] + delta);
  refreshMeta(c);
}
function setFromPlayhead(c, key) {
  c[key] = clampTime(c, key, player.currentTime);
  refreshMeta(c);
}
function seekTo(idx, which) {
  const c = state.clips[idx]; if (!c) return;
  setActive(idx);
  state.stopAt = null;
  player.currentTime = which === "end" ? c.endSec : c.startSec;
}
function playClip(idx) {
  const c = state.clips[idx]; if (!c) return;
  setActive(idx);
  state.stopAt = c.endSec;
  player.currentTime = c.startSec;
  player.play().catch(()=>{});
}
function setActive(idx) {
  state.activeIdx = idx;
  for (const tr of rowsTbody.querySelectorAll("tr")) {
    tr.classList.toggle("playing", +tr.dataset.idx === idx);
  }
  const c = state.clips[idx];
  $("playingId").textContent = c ? c.id : "—";
  if (c) rowsTbody.querySelector(`tr[data-idx="${idx}"]`)?.scrollIntoView({block:"nearest"});
}
function updateKeepCount() {
  $("keepCount").textContent = state.clips.filter(c => c.keep).length;
}

document.addEventListener("keydown", e => {
  const t = e.target;
  if (t instanceof HTMLInputElement && t.type !== "checkbox") return;
  if (!state.clips.length) return;
  if (e.key === "j" || e.key === "ArrowDown") {
    e.preventDefault(); playClip(Math.min(state.clips.length-1, state.activeIdx<0 ? 0 : state.activeIdx+1));
  } else if (e.key === "k" || e.key === "ArrowUp") {
    e.preventDefault(); playClip(Math.max(0, state.activeIdx<0 ? 0 : state.activeIdx-1));
  } else if (e.key === " ") {
    e.preventDefault(); if (player.paused) player.play(); else player.pause();
  } else if (e.key === "x" || e.key === "X" || e.key === "Enter") {
    e.preventDefault();
    if (state.activeIdx >= 0) {
      const c = state.clips[state.activeIdx];
      c.keep = !c.keep; renderTable(); setActive(state.activeIdx);
    }
  }
});

/* ------------------------------------------------------------------ */
/* Export checklist .md                                               */
/* ------------------------------------------------------------------ */
$("exportMdBtn").addEventListener("click", () => {
  const lines = [
    "# Tennis highlights — candidate clips",
    "",
    `- Source: \`${state.videoFile.name}\``,
    `- Output: \`${state.videoFile.name.replace(/\.[^.]+$/, "")}_highlights.mp4\``,
    "",
    "Tick the clips to include, then run render_from_manifest.py on this file.",
    "",
  ];
  state.clips.forEach((c, i) => {
    const dur = c.endSec - c.startSec;
    lines.push(`- [${c.keep ? "x" : " "}] ${c.id} | ${secToTs(c.startSec)} → ${secToTs(c.endSec)} | dur=${dur.toFixed(1)}s | hits=${c.hits} | score=${c.score.toFixed(2)}`);
  });
  const blob = new Blob([lines.join("\n") + "\n"], {type: "text/markdown;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = (state.videoFile.name.replace(/\.[^.]+$/, "")) + "_candidates.md";
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 500);
});

/* ------------------------------------------------------------------ */
/* In-browser render: canvas + WebAudio capture                       */
/* ------------------------------------------------------------------ */
function pickRecorderMime() {
  const candidates = [
    "video/mp4;codecs=avc1,mp4a",
    "video/mp4",
    "video/webm;codecs=vp9,opus",
    "video/webm;codecs=vp8,opus",
    "video/webm",
  ];
  for (const c of candidates) {
    if (window.MediaRecorder && MediaRecorder.isTypeSupported(c)) return c;
  }
  return "";
}

async function ensureAudioGraph() {
  if (state.audioCtx) return;
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const src = ctx.createMediaElementSource(player);
  const gain = ctx.createGain(); gain.gain.value = 1.0;
  src.connect(gain).connect(ctx.destination);
  state.audioCtx = ctx;
  state.mediaSrcNode = src;
  state.speakerGain = gain;
}

function getAudioStreamFromPlayer() {
  // Attach a MediaStreamDestination tap. We keep it for the lifetime of the page.
  const ctx = state.audioCtx;
  const dest = ctx.createMediaStreamDestination();
  state.mediaSrcNode.connect(dest);
  return dest.stream;
}

$("renderBtn").addEventListener("click", () => doRender().catch(e => {
  console.error(e); setStatus("Render error: " + (e && e.message || e)); setProgress(null);
  state.rendering = false; $("cancelBtn").hidden = true;
  $("renderBtn").disabled = false; $("analyzeBtn").disabled = false;
}));
$("cancelBtn").addEventListener("click", () => { state.cancelRender = true; });

async function doRender() {
  const kept = state.clips.filter(c => c.keep).sort((a,b)=>a.startSec-b.startSec);
  if (!kept.length) { setStatus("No clips checked."); return; }
  const totalSec = kept.reduce((s,c)=>s+(c.endSec-c.startSec), 0);
  const mime = pickRecorderMime();
  if (!mime) { setStatus("No supported MediaRecorder mime; cannot render in browser."); return; }

  await ensureAudioGraph();

  state.rendering = true;
  state.cancelRender = false;
  $("renderBtn").disabled = true; $("analyzeBtn").disabled = true;
  $("cancelBtn").hidden = false;
  setProgress(0); setStatus(`Rendering ${kept.length} clips · ~${totalSec.toFixed(1)}s realtime…`);

  // Canvas mirrors the video frame.
  const canvas = $("renderCanvas");
  canvas.width = state.width || 1920; canvas.height = state.height || 1080;
  const cctx = canvas.getContext("2d", { alpha: false });
  let drawing = true;
  function drawLoop() {
    if (!drawing) return;
    cctx.drawImage(player, 0, 0, canvas.width, canvas.height);
    requestAnimationFrame(drawLoop);
  }
  requestAnimationFrame(drawLoop);

  const videoStream = canvas.captureStream(30);
  const audioStream = getAudioStreamFromPlayer();
  const combined = new MediaStream([
    ...videoStream.getVideoTracks(),
    ...audioStream.getAudioTracks(),
  ]);
  const recorder = new MediaRecorder(combined, { mimeType: mime, videoBitsPerSecond: 8_000_000 });
  const chunks = [];
  recorder.ondataavailable = e => { if (e.data && e.data.size) chunks.push(e.data); };

  const recordingDone = new Promise(r => recorder.onstop = r);
  recorder.start();
  // Make sure recorder is in 'recording' before we start; pause immediately to align.
  await sleep(50);

  let elapsed = 0;
  for (let i = 0; i < kept.length; i++) {
    if (state.cancelRender) break;
    const c = kept[i];
    setStatus(`Recording ${i+1}/${kept.length}: ${c.id} (${secToTs(c.startSec)} → ${secToTs(c.endSec)})`);
    setActive(c.idx);

    // Resume recorder for this clip; pause between clips so output is gap-free.
    if (recorder.state === "paused") recorder.resume();

    await seekAndPlayUntil(c.startSec, c.endSec);

    if (i < kept.length - 1) recorder.pause();

    elapsed += (c.endSec - c.startSec);
    setProgress(elapsed / totalSec);
  }

  drawing = false;
  recorder.stop();
  await recordingDone;
  player.pause();

  if (state.cancelRender) {
    setStatus("Render cancelled.");
  } else {
    const blob = new Blob(chunks, { type: mime });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    const ext = mime.includes("mp4") ? "mp4" : "webm";
    a.href = url;
    a.download = (state.videoFile.name.replace(/\.[^.]+$/, "")) + "_highlights." + ext;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    setStatus(`Rendered ${kept.length} clips · ${totalSec.toFixed(1)}s · ${(blob.size/1e6).toFixed(1)}MB`);
  }

  setProgress(null);
  state.rendering = false;
  $("cancelBtn").hidden = true;
  $("renderBtn").disabled = false;
  $("analyzeBtn").disabled = false;
}

function seekAndPlayUntil(startSec, endSec) {
  return new Promise((resolve) => {
    const onSeeked = async () => {
      player.removeEventListener("seeked", onSeeked);
      try { await player.play(); } catch {}
      const tick = () => {
        if (state.cancelRender || player.currentTime >= endSec) {
          player.pause();
          player.removeEventListener("timeupdate", tick);
          resolve();
        }
      };
      player.addEventListener("timeupdate", tick);
    };
    player.addEventListener("seeked", onSeeked);
    try { player.currentTime = startSec; } catch { resolve(); }
  });
}

/* ------------------------------------------------------------------ */
/* Hint about MediaElementSource & speakers                           */
/* ------------------------------------------------------------------ */
// Note: createMediaElementSource permanently re-routes the <video>'s audio
// through WebAudio; the connect-to-destination above keeps it audible.
</script>
